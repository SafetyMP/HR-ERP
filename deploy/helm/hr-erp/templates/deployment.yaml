apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hr-erp.fullname" . }}
  labels:
    {{- include "hr-erp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "hr-erp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "hr-erp.selectorLabels" . | nindent 8 }}
    spec:
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: hr-erp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            {{- if .Values.database.existingSecret }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.existingSecretKey | default "DATABASE_URL" }}
            {{- end }}
            {{- if .Values.auth.existingSecret }}
            - name: JWT_PUBLIC_JWKS_URL
              value: {{ .Values.auth.jwksUrl | quote }}
            - name: JWT_AUDIENCE
              value: {{ .Values.auth.audience | quote }}
            - name: JWT_ISSUER
              value: {{ .Values.auth.issuer | quote }}
            {{- end }}
            {{- if .Values.telemetry.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.telemetry.otlpEndpoint | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.telemetry.serviceName | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
