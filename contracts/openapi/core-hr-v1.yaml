openapi: 3.1.0
info:
  title: Core HR API (Next `/api/v1`)
  version: 1.0.0
  description: |
    Tenant isolation via JWT (`tenant_id` claim) + Postgres RLS (`app.tenant_id` GUC per transaction).
    Responses always include `apiVersion`; errors never expose stack traces or DB internals.
servers:
  - url: /api/v1
paths:
  /employees/{employeeId}:
    get:
      operationId: getEmployeePublicProfile
      summary: Tenant-scoped employee read (RLS); employees without `employees:list` may read self only.
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256)
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeReadEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /attendance/clock-in:
    post:
      operationId: clockInSelf
      summary: Self-service clock-in (server clock); idempotent on `(tenant, idempotencyKey)`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotencyKey]
              properties:
                idempotencyKey:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Accepted or idempotent replay
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockInEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conflict — duplicate clock-in or bad idempotency replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me/attendance/today:
    get:
      operationId: getTodayAttendanceSelf
      summary: Today's punches for the JWT subject employee in their attendance calendar zone.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `attendance:clock` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAttendanceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/paystub/current:
    get:
      operationId: getCurrentPaystubSelf
      summary: Latest finalized paystub for the JWT subject employee (`subject_employee_id` claim).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `paystub:read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — `data.paystub` is null when no finalized instruction exists
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystubEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/benefits/summary:
    get:
      operationId: getBenefitsEnrollmentSummarySelf
      summary: Active benefit enrollments for the JWT subject employee (`subject_employee_id`), UTC calendar basis.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `benefits:read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty `enrollments` when none active
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitsSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/pto/summary:
    get:
      operationId: getPtoSummarySelf
      summary: PTO balance (latest posted) and recorded time-off dates for the JWT subject employee (`subject_employee_id`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `pto:self_read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — null balance when HR has not posted; empty `recentTimeOff` when none recorded
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtoSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/profile:
    get:
      operationId: getMyEmployeeProfileSelf
      summary: HR profile & reachability for JWT subject (`employees:read`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `employees:read` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — includes server-driven field maintenance classes
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: patchMyEmployeeProfileSelf
      summary: Self-service updates for employee-editable profile fields (`profile:self_update`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `profile:self_update` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMyProfileRequest"
      responses:
        "200":
          description: OK — saved profile plus confirmation copy
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfilePatchEnvelope"
        "400":
          description: Validation — generic employee-safe envelope (no field dumps)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/time-off/requests:
    get:
      operationId: listMyTimeOffRequests
      summary: Employee-submitted multi-day leave requests with workflow status (`leave:self_submit`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `leave:self_submit` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — newest submissions first
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequestsListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createMyTimeOffRequest
      summary: Submit an inclusive date range (≤14 calendar days) for HR/manager follow-up.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeOffRequestBody"
      responses:
        "200":
          description: OK — created row with `PENDING` status until HR updates it out-of-band
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequestSingleEnvelope"
        "400":
          description: Validation — invalid range or span too long
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/paystub/history:
    get:
      operationId: listPaystubHistorySelf
      summary: Summarized finalized pay periods for the subject employee (gross/net only).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `paystub:read`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty array when only one or zero periods exist
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystubHistoryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /manager/team/attendance/today:
    get:
      operationId: getManagerTeamAttendanceToday
      summary: Today's punch-derived clock status per direct report (`manager:team_attendance`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with manager or HR role including `manager:team_attendance`; principal must be the manager row.
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty members when manager has no direct reports in Core HR
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerTeamAttendanceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/onboarding/tasks:
    get:
      operationId: listMyOnboardingTasks
      summary: Onboarding checklist rows assigned to the subject employee.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `onboarding:read`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTasksListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMyOnboardingTask
      summary: Advance task status forward along `PENDING` → `IN_PROGRESS` → `DONE`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `onboarding:write`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingTaskBody"
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTaskSingleEnvelope"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/hr-case-requests:
    post:
      operationId: createMyHrCaseRequest
      summary: Structured HR/payroll intake note (`case:intake_submit`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHrCaseRequestBody"
      responses:
        "200":
          description: OK — queued as `OPEN`
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HrCaseRequestSingleEnvelope"
        "400":
          description: Validation — body too short or invalid category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
components:
  responses:
    Unauthorized:
      description: Missing or invalid bearer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: RBAC / ABAC / row-scope denial
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not visible in tenant scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    EmployeeReadEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [employee]
          properties:
            employee:
              type: object
              required: [id, email, firstName, lastName, createdAt]
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                firstName:
                  type: ["string", "null"]
                lastName:
                  type: ["string", "null"]
                createdAt:
                  type: string
                  format: date-time
    ClockInEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [punch]
          properties:
            punch:
              type: object
              required:
                [id, employeeId, kind, occurredAt, idempotentReplay]
              properties:
                id:
                  type: string
                  format: uuid
                employeeId:
                  type: string
                  format: uuid
                kind:
                  type: string
                  enum: [CLOCK_IN]
                occurredAt:
                  type: string
                  format: date-time
                idempotentReplay:
                  type: boolean
    TodayAttendanceEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [todayAttendance]
          properties:
            todayAttendance:
              type: object
              required: [calendarDate, timeZone, clockedIn, punches]
              properties:
                calendarDate:
                  type: string
                  format: date
                timeZone:
                  type: string
                clockedIn:
                  type: boolean
                punches:
                  type: array
                  items:
                    type: object
                    required: [kind, occurredAt]
                    properties:
                      kind:
                        type: string
                        enum: [CLOCK_IN, CLOCK_OUT]
                      occurredAt:
                        type: string
                        format: date-time
    PaystubEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [paystub]
          properties:
            paystub:
              nullable: true
              type: object
              required:
                - paymentInstructionId
                - payPeriodStart
                - payPeriodEnd
                - currencyCode
                - grossPayMinor
                - netPayMinor
                - earnings
                - preTaxDeductions
                - taxes
              properties:
                paymentInstructionId:
                  type: string
                  format: uuid
                payPeriodStart:
                  type: string
                  format: date
                payPeriodEnd:
                  type: string
                  format: date
                currencyCode:
                  type: string
                grossPayMinor:
                  type: integer
                netPayMinor:
                  type: integer
                earnings:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
                preTaxDeductions:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
                taxes:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
    BenefitsSummaryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [benefitsSummary]
          properties:
            benefitsSummary:
              type: object
              required: [calendarBasis, enrollments]
              properties:
                calendarBasis:
                  type: string
                  enum: [UTC]
                enrollments:
                  type: array
                  items:
                    $ref: "#/components/schemas/BenefitEnrollmentItem"
    BenefitEnrollmentItem:
      type: object
      required:
        - category
        - categoryLabel
        - planLabel
        - carrierName
        - effectiveFrom
        - effectiveTo
        - dependentCount
        - electiveDeferralPercent
      properties:
        category:
          type: string
          enum: [MEDICAL, DENTAL, VISION, INCOME_PROTECTION, RETIREMENT]
        categoryLabel:
          type: string
        planLabel:
          type: string
        carrierName:
          nullable: true
          type: string
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          nullable: true
          type: string
          format: date
        dependentCount:
          nullable: true
          type: integer
        electiveDeferralPercent:
          nullable: true
          type: number
    PtoSummaryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [ptoSummary]
          properties:
            ptoSummary:
              type: object
              required: [balanceHours, balanceAsOfDate, recentTimeOff]
              properties:
                balanceHours:
                  nullable: true
                  type: number
                  description: Posted available hours from latest `PtoBalance` row, if any
                balanceAsOfDate:
                  nullable: true
                  type: string
                  format: date
                recentTimeOff:
                  type: array
                  items:
                    $ref: "#/components/schemas/PtoRecordedDateRow"
    PtoRecordedDateRow:
      type: object
      required: [requestDate]
      properties:
        requestDate:
          type: string
          format: date
    TimeOffRequestItem:
      type: object
      required: [id, startDate, endDate, status, note, createdAt]
      properties:
        id:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED]
        note:
          nullable: true
          type: string
        createdAt:
          type: string
          format: date-time
    TimeOffRequestsListEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [timeOffRequests]
          properties:
            timeOffRequests:
              type: array
              items:
                $ref: "#/components/schemas/TimeOffRequestItem"
    TimeOffRequestSingleEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [timeOffRequest]
          properties:
            timeOffRequest:
              $ref: "#/components/schemas/TimeOffRequestItem"
    CreateTimeOffRequestBody:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          nullable: true
          type: string
          maxLength: 500
    PaystubHistorySummary:
      type: object
      required:
        [paymentInstructionId, payPeriodStart, payPeriodEnd, currencyCode, grossPayMinor, netPayMinor]
      properties:
        paymentInstructionId:
          type: string
          format: uuid
        payPeriodStart:
          type: string
          format: date
        payPeriodEnd:
          type: string
          format: date
        currencyCode:
          type: string
        grossPayMinor:
          type: integer
        netPayMinor:
          type: integer
    PaystubHistoryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [paystubHistory]
          properties:
            paystubHistory:
              type: array
              items:
                $ref: "#/components/schemas/PaystubHistorySummary"
    ManagerTeamMemberAttendance:
      type: object
      required: [employeeId, displayName, calendarDate, timeZone, clockedIn, punches]
      properties:
        employeeId:
          type: string
          format: uuid
        displayName:
          type: string
        calendarDate:
          type: string
          format: date
        timeZone:
          type: string
        clockedIn:
          type: boolean
        punches:
          type: array
          items:
            type: object
            required: [kind, occurredAt]
            properties:
              kind:
                type: string
                enum: [CLOCK_IN, CLOCK_OUT]
              occurredAt:
                type: string
                format: date-time
    ManagerTeamAttendanceEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [managerTeamAttendance]
          properties:
            managerTeamAttendance:
              type: object
              required: [members]
              properties:
                members:
                  type: array
                  items:
                    $ref: "#/components/schemas/ManagerTeamMemberAttendance"
    OnboardingTaskItem:
      type: object
      required: [id, title, status, dueAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, DONE]
        dueAt:
          nullable: true
          type: string
          format: date
        updatedAt:
          type: string
          format: date-time
    OnboardingTasksListEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [onboardingTasks]
          properties:
            onboardingTasks:
              type: array
              items:
                $ref: "#/components/schemas/OnboardingTaskItem"
    OnboardingTaskSingleEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [onboardingTask]
          properties:
            onboardingTask:
              $ref: "#/components/schemas/OnboardingTaskItem"
    PatchOnboardingTaskBody:
      type: object
      required: [taskId, status]
      properties:
