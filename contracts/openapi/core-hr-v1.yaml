        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /learning/courses/{id}/assignments:
    post:
      operationId: assignLearningCourse
      summary: Assign a PUBLISHED course to one or more employees (idempotent).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [employeeIds]
              properties:
                employeeIds:
                  type: array
                  minItems: 1
                  maxItems: 500
                  items: { type: string, format: uuid }
      responses:
        "201":
          description: Assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "404":
          description: Course not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Course not PUBLISHED
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me/learning/enrollments/{id}/complete:
    post:
      operationId: completeMyLearningEnrollment
      summary: Mark the calling employee's enrollment COMPLETED.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                scoreBp: { type: integer, minimum: 0, maximum: 10000 }
      responses:
        "200":
          description: Completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "403":
          description: Not the enrollment owner
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "404":
          description: Enrollment not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Enrollment in terminal state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /workflow/definitions:
    post:
      operationId: createWorkflowDefinition
      summary: Register a multi-step approval workflow blueprint.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, code, name, steps]
              properties:
                kind:
                  type: string
                  enum:
                    - TIME_OFF_APPROVAL
                    - COMPENSATION_CHANGE
                    - POSITION_CHANGE
                    - TERMINATION
                    - CUSTOM
                    - COBRA_ELECTION
                    - ONBOARDING
                    - OFFBOARDING
                code: { type: string, minLength: 1, maxLength: 80 }
                name: { type: string, minLength: 1, maxLength: 200 }
                description: { type: string, maxLength: 2000, nullable: true }
                steps:
                  type: array
                  minItems: 1
                  maxItems: 10
                  items:
                    type: object
                    required: [name, approverRoles]
                    properties:
                      name: { type: string, minLength: 1, maxLength: 120 }
                      approverRoles:
                        type: array
                        minItems: 1
                        maxItems: 10
                        items: { type: string }
                      slaHours:
                        type: integer
                        minimum: 1
                        maximum: 720
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
  /workflow/instances:
    post:
      operationId: startWorkflowInstance
      summary: Start a workflow instance for a subject (e.g. PtoRequest UUID).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [definitionCode, subjectType, subjectRef]
              properties:
                definitionCode: { type: string, minLength: 1, maxLength: 80 }
                subjectType: { type: string, minLength: 1, maxLength: 120 }
                subjectRef: { type: string, minLength: 1, maxLength: 200 }
                context:
                  type: object
                  additionalProperties: true
      responses:
        "201":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "404":
          description: Workflow definition not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /workflow/instances/{id}/decisions:
    post:
      operationId: decideWorkflowInstanceStep
      summary: Approve or reject the current PENDING step.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [decision]
              properties:
                decision:
                  type: string
                  enum: [APPROVED, REJECTED]
                note:
                  type: string
                  maxLength: 2000
                  nullable: true
      responses:
        "200":
          description: Decision recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Instance not ACTIVE or no PENDING step
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /integrations/webhooks/subscriptions:
    post:
      operationId: createWebhookSubscription
      summary: Register an HMAC-signed outbound webhook subscription.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [label, targetUrl, eventTypes, secret]
              properties:
                label: { type: string, minLength: 1, maxLength: 120 }
                targetUrl:
                  type: string
                  format: uri
                  description: HTTPS URL that will receive POSTs.
                eventTypes:
                  type: array
                  minItems: 1
                  maxItems: 50
                  items:
                    type: string
                    minLength: 1
                    maxLength: 120
                  description: |
                    Allowed prefixes: `domain.`, `integration.`, `compliance.`,
                    `audit.` — keep the list small to limit fan-out.
                secret:
                  type: string
                  minLength: 32
                  maxLength: 256
                  description: |
                    Shared HMAC-SHA256 secret used to sign deliveries via the
                    `X-HRERP-Signature-256` header.
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "400":
          description: Validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /positions:
    post:
      operationId: createPosition
      summary: Register a PROPOSED position (planned headcount slot).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, title, effectiveFrom]
              properties:
                code: { type: string, minLength: 1, maxLength: 80 }
                title: { type: string, minLength: 1, maxLength: 200 }
                jobRoleId: { type: string, format: uuid, nullable: true }
                departmentId: { type: string, format: uuid, nullable: true }
                parentPositionId: { type: string, format: uuid, nullable: true }
                headcount: { type: integer, minimum: 1, maximum: 1000 }
                fteBasisPoints: { type: integer, minimum: 1, maximum: 10000 }
                effectiveFrom: { type: string, format: date }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "400":
          description: Validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /engagement/surveys:
    post:
      operationId: createEngagementSurvey
      summary: Create a DRAFT engagement / eNPS / pulse survey.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, title]
              properties:
                kind:
                  type: string
                  enum: [ENPS, PULSE, ANNUAL, CUSTOM]
                title: { type: string, minLength: 1, maxLength: 200 }
                description: { type: string, maxLength: 2000, nullable: true }
                anonymize: { type: boolean }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
  /me/engagement/responses:
    post:
      operationId: submitMyEngagementResponse
      summary: Submit / update the calling employee's response to an OPEN survey.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [surveyId, score]
              properties:
                surveyId: { type: string, format: uuid }
                score: { type: integer, minimum: 0, maximum: 10 }
                comment: { type: string, maxLength: 4000, nullable: true }
      responses:
        "201":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "404":
          description: Survey not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Survey not OPEN
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /recruiting/offers/{id}/extend:
    post:
      operationId: extendRecruitingOffer
      summary: |
        Extend an offer using an APPROVED HIRE-class governance proposal that
        references the same JobApplication.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [authorizingProposalId]
              properties:
                authorizingProposalId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Extended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Offer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "409":
          description: Offer not in PENDING_HITL_APPROVAL or governance violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
components:
  parameters:
    AuthorizationHeader:
      name: Authorization
      in: header
      required: true
      schema:
        type: string
      description: Bearer JWT (HS256 in dev, JWKS-asymmetric in production)
    CorrelationIdHeader:
      name: X-Correlation-Id
      in: header
      required: false
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid bearer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    Forbidden:
      description: RBAC / ABAC / row-scope denial
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFound:
      description: Not visible in tenant scope
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
  schemas:
    EmployeeReadEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [employee]
          properties:
            employee:
              type: object
              required: [id, email, firstName, lastName, createdAt]
              properties:
                id:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                firstName:
                  type: ["string", "null"]
                lastName:
                  type: ["string", "null"]
                createdAt:
                  type: string
                  format: date-time
    ClockInEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [punch]
          properties:
            punch:
              type: object
              required:
                [id, employeeId, kind, occurredAt, idempotentReplay]
              properties:
                id:
                  type: string
                  format: uuid
                employeeId:
                  type: string
                  format: uuid
                kind:
                  type: string
                  enum: [CLOCK_IN]
                occurredAt:
                  type: string
                  format: date-time
                idempotentReplay:
                  type: boolean
    TodayAttendanceEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [todayAttendance]
          properties:
            todayAttendance:
              type: object
              required: [calendarDate, timeZone, clockedIn, punches]
              properties:
                calendarDate:
                  type: string
                  format: date
                timeZone:
                  type: string
                clockedIn:
                  type: boolean
                punches:
                  type: array
                  items:
                    type: object
                    required: [kind, occurredAt]
                    properties:
                      kind:
                        type: string
                        enum: [CLOCK_IN, CLOCK_OUT]
                      occurredAt:
                        type: string
                        format: date-time
    PaystubEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [paystub]
          properties:
            paystub:
              nullable: true
              type: object
              required:
                - paymentInstructionId
                - payPeriodStart
                - payPeriodEnd
                - currencyCode
                - grossPayMinor
                - netPayMinor
                - earnings
                - preTaxDeductions
                - taxes
              properties:
                paymentInstructionId:
                  type: string
                  format: uuid
                payPeriodStart:
                  type: string
                  format: date
                payPeriodEnd:
                  type: string
                  format: date
                currencyCode:
                  type: string
                grossPayMinor:
                  type: integer
                netPayMinor:
                  type: integer
                earnings:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
                preTaxDeductions:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
                taxes:
                  type: array
                  items:
                    $ref: "#/components/schemas/PaystubLine"
    BenefitsSummaryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [benefitsSummary]
          properties:
            benefitsSummary:
              type: object
              required: [calendarBasis, enrollments]
              properties:
                calendarBasis:
                  type: string
                  enum: [UTC]
                enrollments:
                  type: array
                  items:
                    $ref: "#/components/schemas/BenefitEnrollmentItem"
    BenefitEnrollmentItem:
      type: object
      required:
        - category
        - categoryLabel
        - planLabel
        - carrierName
        - effectiveFrom
        - effectiveTo
        - dependentCount
        - electiveDeferralPercent
      properties:
        category:
          type: string
          enum: [MEDICAL, DENTAL, VISION, INCOME_PROTECTION, RETIREMENT]
        categoryLabel:
          type: string
        planLabel:
          type: string
        carrierName:
          nullable: true
          type: string
        effectiveFrom:
          type: string
          format: date
        effectiveTo:
          nullable: true
          type: string
          format: date
        dependentCount:
          nullable: true
          type: integer
        electiveDeferralPercent:
          nullable: true
          type: number
    PtoSummaryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [ptoSummary]
          properties:
            ptoSummary:
              type: object
              required: [balanceHours, balanceAsOfDate, recentTimeOff]
              properties:
                balanceHours:
                  nullable: true
                  type: number
                  description: Posted available hours from latest `PtoBalance` row, if any
                balanceAsOfDate:
                  nullable: true
                  type: string
                  format: date
                recentTimeOff:
                  type: array
                  items:
                    $ref: "#/components/schemas/PtoRecordedDateRow"
    PtoRecordedDateRow:
      type: object
      required: [requestDate]
      properties:
        requestDate:
          type: string
          format: date
    TimeOffRequestItem:
      type: object
      required: [id, startDate, endDate, status, note, createdAt]
      properties:
        id:
          type: string
          format: uuid
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        status:
          type: string
          enum: [PENDING, APPROVED, DENIED]
        note:
          nullable: true
          type: string
        createdAt:
          type: string
          format: date-time
    TimeOffRequestsListEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [timeOffRequests]
          properties:
            timeOffRequests:
              type: array
              items:
                $ref: "#/components/schemas/TimeOffRequestItem"
    TimeOffRequestSingleEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [timeOffRequest]
          properties:
            timeOffRequest:
              $ref: "#/components/schemas/TimeOffRequestItem"
    CreateTimeOffRequestBody:
      type: object
      required: [startDate, endDate]
      properties:
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        note:
          nullable: true
          type: string
          maxLength: 500
    PaystubHistorySummary:
      type: object
      required:
        [paymentInstructionId, payPeriodStart, payPeriodEnd, currencyCode, grossPayMinor, netPayMinor]
      properties:
        paymentInstructionId:
          type: string
          format: uuid
        payPeriodStart:
          type: string
          format: date
        payPeriodEnd:
          type: string
          format: date
        currencyCode:
          type: string
        grossPayMinor:
          type: integer
        netPayMinor:
          type: integer
    PaystubHistoryEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [paystubHistory]
          properties:
            paystubHistory:
              type: array
              items:
                $ref: "#/components/schemas/PaystubHistorySummary"
    ManagerTeamMemberAttendance:
      type: object
      required: [employeeId, displayName, calendarDate, timeZone, clockedIn, punches]
      properties:
        employeeId:
          type: string
          format: uuid
        displayName:
          type: string
        calendarDate:
          type: string
          format: date
        timeZone:
          type: string
        clockedIn:
          type: boolean
        punches:
          type: array
          items:
            type: object
            required: [kind, occurredAt]
            properties:
              kind:
                type: string
                enum: [CLOCK_IN, CLOCK_OUT]
              occurredAt:
                type: string
                format: date-time
    ManagerTeamAttendanceEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [managerTeamAttendance]
          properties:
            managerTeamAttendance:
              type: object
              required: [members]
              properties:
                members:
                  type: array
                  items:
                    $ref: "#/components/schemas/ManagerTeamMemberAttendance"
    OnboardingTaskItem:
      type: object
      required: [id, title, status, dueAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, DONE]
        dueAt:
          nullable: true
          type: string
          format: date
        updatedAt:
          type: string
          format: date-time
    OnboardingTasksListEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [onboardingTasks]
          properties:
            onboardingTasks:
              type: array
              items:
                $ref: "#/components/schemas/OnboardingTaskItem"
    OnboardingTaskSingleEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [onboardingTask]
          properties:
            onboardingTask:
              $ref: "#/components/schemas/OnboardingTaskItem"
    PatchOnboardingTaskBody:
      type: object
      required: [taskId, status]
      properties:
        taskId:
          type: string
          format: uuid
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, DONE]
    CreateHrCaseRequestBody:
      type: object
      required: [category, body]
      properties:
        category:
          type: string
          enum: [PAYROLL, BENEFITS, HR_OTHER]
        body:
          type: string
          minLength: 8
          maxLength: 4000
    HrCaseRequestSingleEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [hrCaseRequest]
          properties:
            hrCaseRequest:
              type: object
              required: [id, category, status, createdAt]
              properties:
                id:
                  type: string
                  format: uuid
                category:
                  type: string
                  enum: [PAYROLL, BENEFITS, HR_OTHER]
                status:
                  type: string
                  enum: [OPEN, ACKNOWLEDGED]
                createdAt:
                  type: string
                  format: date-time
    MyProfileEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [profile, fieldPolicy]
          properties:
            profile:
              $ref: "#/components/schemas/EmployeeSelfProfile"
            fieldPolicy:
              type: object
              additionalProperties:
                type: string
                enum: [hr_maintained, self_editable]
    MyProfilePatchEnvelope:
      type: object
      required: [apiVersion, data]
      properties:
        apiVersion:
          type: string
          enum: [v1]
        data:
          type: object
          required: [profile, fieldPolicy, confirmationMessage]
          properties:
            profile:
              $ref: "#/components/schemas/EmployeeSelfProfile"
            fieldPolicy:
              type: object
              additionalProperties:
                type: string
                enum: [hr_maintained, self_editable]
            confirmationMessage:
              type: string
    EmployeeSelfProfile:
      type: object
      required:
        - legalGivenName
        - legalFamilyName
        - preferredName
        - workEmail
        - personalEmail
        - phone
        - mailingAddress
        - emergencyContact
      properties:
        legalGivenName:
          nullable: true
          type: string
        legalFamilyName:
          nullable: true
          type: string
        preferredName:
          nullable: true
          type: string
