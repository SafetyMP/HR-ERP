    post:
      operationId: createRecruitingScreeningProposal
      summary: |
        Create an HITL-gated AI screening proposal for an application. The
        proposal must be APPROVED separately (governance:ai_approve) before it
        can authorize a HIRED stage transition or an offer extension.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [rationale]
              properties:
                rationale: { type: string, minLength: 1, maxLength: 8000 }
                modelVersion: { type: string, nullable: true, maxLength: 120 }
                factors:
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required: [label, direction]
                    properties:
                      label: { type: string, minLength: 1, maxLength: 120 }
                      direction:
                        type: string
                        enum: [increases_score, decreases_score, neutral]
                      detail: { type: string, maxLength: 500 }
