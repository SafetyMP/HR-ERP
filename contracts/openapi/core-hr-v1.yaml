openapi: 3.1.0
info:
  title: Core HR API (Next `/api/v1`)
  version: 1.0.0
  description: |
    Tenant isolation via JWT (`tenant_id` claim) + Postgres RLS (`app.tenant_id` GUC per transaction).
    Responses always include `apiVersion`; errors never expose stack traces or DB internals.
servers:
  - url: /api/v1
paths:
  /employees/{employeeId}:
    get:
      operationId: getEmployeePublicProfile
      summary: Tenant-scoped employee read (RLS); employees without `employees:list` may read self only.
      parameters:
        - name: employeeId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256)
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmployeeReadEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /attendance/clock-in:
    post:
      operationId: clockInSelf
      summary: Self-service clock-in (server clock); idempotent on `(tenant, idempotencyKey)`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [idempotencyKey]
              properties:
                idempotencyKey:
                  type: string
                  format: uuid
      responses:
        "200":
          description: Accepted or idempotent replay
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClockInEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Conflict — duplicate clock-in or bad idempotency replay
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
  /me/attendance/today:
    get:
      operationId: getTodayAttendanceSelf
      summary: Today's punches for the JWT subject employee in their attendance calendar zone.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `attendance:clock` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TodayAttendanceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/paystub/current:
    get:
      operationId: getCurrentPaystubSelf
      summary: Latest finalized paystub for the JWT subject employee (`subject_employee_id` claim).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `paystub:read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — `data.paystub` is null when no finalized instruction exists
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystubEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/benefits/summary:
    get:
      operationId: getBenefitsEnrollmentSummarySelf
      summary: Active benefit enrollments for the JWT subject employee (`subject_employee_id`), UTC calendar basis.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `benefits:read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty `enrollments` when none active
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BenefitsSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/pto/summary:
    get:
      operationId: getPtoSummarySelf
      summary: PTO balance (latest posted) and recorded time-off dates for the JWT subject employee (`subject_employee_id`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT (HS256) with `pto:self_read` and tenant claims
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — null balance when HR has not posted; empty `recentTimeOff` when none recorded
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PtoSummaryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/profile:
    get:
      operationId: getMyEmployeeProfileSelf
      summary: HR profile & reachability for JWT subject (`employees:read`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `employees:read` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — includes server-driven field maintenance classes
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfileEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      operationId: patchMyEmployeeProfileSelf
      summary: Self-service updates for employee-editable profile fields (`profile:self_update`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `profile:self_update` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMyProfileRequest"
      responses:
        "200":
          description: OK — saved profile plus confirmation copy
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MyProfilePatchEnvelope"
        "400":
          description: Validation — generic employee-safe envelope (no field dumps)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/time-off/requests:
    get:
      operationId: listMyTimeOffRequests
      summary: Employee-submitted multi-day leave requests with workflow status (`leave:self_submit`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `leave:self_submit` and `subject_employee_id`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — newest submissions first
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequestsListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: createMyTimeOffRequest
      summary: Submit an inclusive date range (≤14 calendar days) for HR/manager follow-up.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimeOffRequestBody"
      responses:
        "200":
          description: OK — created row with `PENDING` status until HR updates it out-of-band
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimeOffRequestSingleEnvelope"
        "400":
          description: Validation — invalid range or span too long
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/paystub/history:
    get:
      operationId: listPaystubHistorySelf
      summary: Summarized finalized pay periods for the subject employee (gross/net only).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `paystub:read`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty array when only one or zero periods exist
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaystubHistoryEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /manager/team/attendance/today:
    get:
      operationId: getManagerTeamAttendanceToday
      summary: Today's punch-derived clock status per direct report (`manager:team_attendance`).
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with manager or HR role including `manager:team_attendance`; principal must be the manager row.
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK — empty members when manager has no direct reports in Core HR
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManagerTeamAttendanceEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/onboarding/tasks:
    get:
      operationId: listMyOnboardingTasks
      summary: Onboarding checklist rows assigned to the subject employee.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `onboarding:read`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTasksListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: patchMyOnboardingTask
      summary: Advance task status forward along `PENDING` → `IN_PROGRESS` → `DONE`.
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: Bearer JWT with `onboarding:write`
        - name: X-Correlation-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchOnboardingTaskBody"
      responses:
        "200":
          description: OK
          headers:
            X-Correlation-Id:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardingTaskSingleEnvelope"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /employees:
    get:
      operationId: listEmployees
      summary: Tenant-scoped employee list (`employees:list`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /payroll/runs:
    get:
      operationId: listPayrollRuns
      summary: List recent payroll periods with payment-instruction counts (`payroll:run_read`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRunsListEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      operationId: executePayrollRun
      summary: Execute deterministic gross-to-net for a tenant + payroll period (`payroll:run_execute`, MFA `elevated`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunPayrollRequest"
      responses:
        "201":
          description: Created — kernel produced PaymentInstruction + PayoutLine rows
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunPayrollSummaryEnvelope"
        "400":
          description: Validation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /payroll/runs/{periodId}:
    get:
      operationId: getPayrollRunDetail
      summary: Detailed payment instructions + payout lines for a payroll period (`payroll:run_read`).
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - $ref: "#/components/parameters/AuthorizationHeader"
        - $ref: "#/components/parameters/CorrelationIdHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PayrollRunDetailEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
  /me/tax-documents/summary:
    get:
      operationId: getTaxDocumentsSummary
      summary: Year-end tax document availability summary for the subject employee.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/benefits/election-change-requests:
    post:
      operationId: submitBenefitElectionChangeRequest
      summary: Self-service benefit election change intent (`benefits:election_intent_submit`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /me/organization/context:
    get:
      operationId: getMyOrganizationContext
      summary: Department / job role / manager context for the subject employee.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /me/separation/tasks:
    get:
      operationId: listMySeparationTasks
      summary: Read offboarding checklist for the subject employee.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      operationId: patchMySeparationTask
      summary: Advance an offboarding task forward.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /manager/team/time-off/requests:
    get:
      operationId: listManagerTeamTimeOffRequests
      summary: Time-off requests pending or recent for the manager's team (`leave:manager_decide`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /manager/team/time-off/decision:
    patch:
      operationId: decideManagerTeamTimeOff
      summary: Approve or deny a direct report's time-off request (`leave:manager_decide`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /manager/team/attendance/correction-requests:
    get:
      operationId: listManagerTeamAttendanceCorrectionRequests
      summary: List manager-initiated attendance corrections.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createManagerTeamAttendanceCorrectionRequest
      summary: Submit an attendance correction request for a direct report.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/attendance/correction-requests/pending:
    get:
      operationId: listHrPendingAttendanceCorrectionRequests
      summary: HR review queue of pending attendance corrections.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/attendance/correction-requests/review:
    patch:
      operationId: reviewHrAttendanceCorrectionRequest
      summary: Approve or deny an attendance correction (`attendance:correction_review`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/case-requests/pending:
    get:
      operationId: listHrPendingCaseRequests
      summary: HR review queue of HR/payroll/benefits intake notes.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/case-requests/review:
    patch:
      operationId: reviewHrCaseRequest
      summary: Acknowledge an employee HR case (`case:hr_triage`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/onboarding/templates:
    get:
      operationId: listHrOnboardingTemplates
      summary: HR onboarding template catalog (`hr:onboarding_template_assign`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /hr/onboarding/apply-template:
    post:
      operationId: applyHrOnboardingTemplate
      summary: Apply an onboarding template to an employee.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenericEnvelope"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /analytics/churn:
    get:
      operationId: getAnalyticsChurn
      summary: Read churn scores + feature snapshots (`analytics:churn:read`).
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /analytics/skills/match:
    get:
      operationId: getAnalyticsSkillsMatch
      summary: Internal mobility skill-match scoring against a target role.
      parameters:
        - $ref: "#/components/parameters/AuthorizationHeader"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericEnvelope"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /analytics/benchmarks:
    get:
