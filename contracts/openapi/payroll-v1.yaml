openapi: 3.0.3
info:
  title: HR ERP Payroll API (extracted context)
  version: 0.1.0
  description: Stub contract for Payroll bounded context; expand as ports replace monolith routes.
paths:
  /api/v1/payroll/runs:
    post:
      summary: Run payroll for a period
      responses:
        "200":
          description: Pay run result
  /api/v1/payroll/runs/{periodId}:
    get:
      summary: Pay period detail
      parameters:
        - name: periodId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Period payload
