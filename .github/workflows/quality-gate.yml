name: Quality gate

# Runs lint/build/unit + layered QA on PRs only.
# Merges to main/master run CI+QA exclusively via `deploy.yml` to avoid triple billing.
# Feature-branch pushes without a PR do not trigger this workflow (use workflow_dispatch).

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    uses: ./.github/workflows/reusable-ci.yml
    secrets: inherit

  qa:
    uses: ./.github/workflows/reusable-qa.yml
    secrets: inherit
