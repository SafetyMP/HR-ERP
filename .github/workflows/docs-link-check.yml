name: docs-link-check
on:
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
  push:
    branches: [main, master]
    paths:
      - '**.md'
      - 'docs/**'

permissions:
  contents: read

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Markdown link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress '**/*.md'
          fail: true
