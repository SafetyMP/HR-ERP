# Analyzes Conventional Commits on main/master, bumps root package.json + CHANGELOG,
# commits with [skip ci], creates a Git Tag and GitHub Release — triggering publish-ghcr.yml.
#
# When main requires PRs (classic protection / rulesets), default GITHUB_TOKEN cannot push
# the @semantic-release/git release commit. Set repo secret SEMANTIC_RELEASE_TOKEN to a
# fine-grained PAT or GitHub App token whose actor is on the branch-protection bypass list.
# See docs/community/github-branch-protection.md.
name: Semantic release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.head_commit && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          # Prefer SEMANTIC_RELEASE_TOKEN so @semantic-release/git can push to protected main.
          token: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run governance:ci
      - run: npm test

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.SEMANTIC_RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
        run: npx semantic-release
