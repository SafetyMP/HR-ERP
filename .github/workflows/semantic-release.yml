# Analyzes Conventional Commits on main/master, bumps root package.json + CHANGELOG,
# commits with [skip ci], creates a Git Tag and GitHub Release — triggering publish-ghcr.yml.
name: Semantic release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: semantic-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.head_commit && !contains(github.event.head_commit.message, '[skip ci]')) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci
      - run: npm run governance:ci
      - run: npm test

      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
