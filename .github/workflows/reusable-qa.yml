# Called from quality-gate (PR/feature branches) and deploy.yml before production promotion.
name: reusable-qa

on:
  workflow_call:


permissions:
  contents: read

env:
  # Paste into FAILURE_SUMMARY.REPRO when Vitest shards fail in CI
  VITEST_SEED: ${{ github.run_id }}

jobs:
  vitest-shard:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Vitest (shard ${{ matrix.shard }}/2)
        run: npx vitest run --shard=${{ matrix.shard }}/2
      - name: FAILURE_SUMMARY reminder
        if: failure()
        run: bash scripts/qa-print-failure-envelope.sh

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: hr_erp
          POSTGRES_PASSWORD: hr_erp_ci
          POSTGRES_DB: hr_erp
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U hr_erp -d hr_erp"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    env:
      DATABASE_URL: postgresql://hr_erp:hr_erp_ci@127.0.0.1:5432/hr_erp
      JWT_SECRET: ci-local-jwt-secret-change-me-32chars-minimum-xx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npm run db:verify
      - run: npx vitest run tests/integration
      - name: FAILURE_SUMMARY reminder
        if: failure()
        run: bash scripts/qa-print-failure-envelope.sh

  e2e:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-local-jwt-secret-change-me-32chars-minimum-xx
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx playwright install chromium --with-deps
      - name: Mint e2e JWTs for feature UAC specs
        run: node scripts/ci-issue-e2e-jwts.mjs --github-env >> $GITHUB_ENV
      - run: npm run check:ess-design-tokens
      - run: npm run test:e2e
      - name: ESS friction scorecard (Track B)
        run: npm run test:e2e -- tests/e2e/ess-friction-budgets.spec.ts tests/e2e/benefits-election-change-friction.spec.ts
      - name: FAILURE_SUMMARY reminder
        if: failure()
        run: bash scripts/qa-print-failure-envelope.sh
