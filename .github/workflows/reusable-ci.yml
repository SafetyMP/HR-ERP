# Called from quality-gate (PR/feature branches) and deploy.yml before production promotion.
name: reusable-ci

on:
  workflow_call:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    env:
      JWT_SECRET: ci-local-jwt-secret-change-me-32chars-minimum-xx
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: OSS publish metadata (HR ERP harness policy)
        run: chmod +x scripts/publish-check.sh && bash -n scripts/publish-check.sh && ./scripts/publish-check.sh
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run security:scan
      - run: npm run governance:production-safety
      - name: Dependency audit (high+)
        run: npm audit --audit-level=high
        continue-on-error: false
      - name: Secret scan (gitleaks)
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v8.24.2/gitleaks_8.24.2_linux_x64.tar.gz" | tar xz gitleaks
          chmod +x gitleaks
          ./gitleaks detect --source . --no-git --redact
      - name: Agent governance lint (strict)
        run: npm run governance:ci
      - name: Export governance tier
        run: |
          TIER=$(node scripts/governance-lint.mjs diff 2>/dev/null | awk '/Suggested riskTier:/ {print $3}')
          echo "governance_tier=${TIER:-T0}" >> "$GITHUB_OUTPUT"
        id: governance_tier
      - name: protect-mcp shadow policy check
        run: npm run governance:protect-mcp
      - name: Agent governance PR body (strict, pull_request only)
        if: github.event_name == 'pull_request'
        run: node scripts/governance-lint.mjs pr-body --strict --fail-on-under-tier
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
      - run: npm run contracts:drift
      - run: npm run check:route-policies
      - run: npm run check:lib-boundaries
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test
      - run: npm run test:ui
      - run: npm run test:payroll

  python-pipelines:
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.files.*.path, 'services/pipelines/') ||
      contains(github.event.pull_request.files.*.path, 'services/ml-serving/')
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install ML deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/pipelines/requirements-ci.txt
      - name: Train churn (smoke)
        run: python services/pipelines/train_churn.py
