# Called from quality-gate (PR/feature branches) and deploy.yml before production promotion.
name: reusable-ci

on:
  workflow_call:

jobs:
  web:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      JWT_SECRET: ci-local-jwt-secret-change-me-32chars-minimum-xx
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run security:scan
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm run build
      - run: npm run test

  python-pipelines:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install ML deps
        run: |
          python -m pip install --upgrade pip
          pip install -r services/pipelines/requirements-ci.txt
      - name: Train churn (smoke)
        run: python services/pipelines/train_churn.py
