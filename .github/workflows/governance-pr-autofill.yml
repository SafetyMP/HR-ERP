name: governance-pr-autofill

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  autofill-governance:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.type != 'Bot'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Generate governance PR body stub
        run: node scripts/governance-generate-pr-body.mjs > /tmp/governance-pr-body.md
      - name: Strict PR body lint (T2+)
        if: github.event.pull_request.base.ref == 'main'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          node scripts/governance-lint.mjs diff --strict > /tmp/tier.txt 2>&1 || true
          TIER=$(grep -o 'T[0-4]' /tmp/tier.txt | head -1 || echo T0)
          if [ "$TIER" = "T2" ] || [ "$TIER" = "T3" ] || [ "$TIER" = "T4" ]; then
            node scripts/governance-lint.mjs pr-body --strict --fail-on-under-tier --body "$PR_BODY"
          fi
      - name: Append governance stub when missing
        uses: actions/github-script@v7
        env:
          STUB_PATH: /tmp/governance-pr-body.md
        with:
          script: |
            const fs = require('fs');
            const pr = context.payload.pull_request;
            const existing = pr.body ?? '';
            function hasSubstantiveGovernance(body) {
              if (!/riskTier:/i.test(body)) return false;
              if (!/Golden thread|Risk or requirement/i.test(body)) return false;
              if (!/PO orchestration checkpoint/i.test(body) && !/step 1 chore N\/A/i.test(body)) {
                return false;
              }
              const rows = body.split('\n').filter((l) => l.trim().startsWith('|') && !l.includes('---'));
              let filledRow = false;
              for (const row of rows) {
                const cells = row.split('|').map((c) => c.trim()).filter(Boolean);
                if (
                  cells[0] &&
                  !cells[0].toLowerCase().includes('risk or requirement') &&
                  cells.some((c) => c.length > 2 && c !== 'N/A')
                ) {
                  filledRow = true;
                  break;
                }
              }
              if (!filledRow) return false;
              if (/PO gate complete:\s*Y/i.test(body) || /step 1 chore N\/A/i.test(body)) return true;
              if (/UAC count:\s*\d+/i.test(body)) return true;
              return false;
            }
            if (hasSubstantiveGovernance(existing)) {
              core.info('PR body already has substantive governance sections — skipping autofill');
              return;
            }
            const stub = fs.readFileSync(process.env.STUB_PATH, 'utf8');
            const updated = existing.trim()
              ? `${existing.trim()}\n\n---\n\n<!-- governance-autofill -->\n${stub}`
              : stub;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              body: updated,
            });
