name: Documentation
description: Gap in contributor or operator docs (README drift, onboarding dead-ends).
title: "[Docs]: "
labels:
  - documentation
body:
  - type: markdown
    attributes:
      value: |
        Link the specific file(s) whenever possible (`docs/README.md`, `docs/QA.md`, `docs/operations/...`).
        Maintainer agents may cite this issue when syncing Developer Advocate tooling—no PII in attachments.
  - type: textarea
    id: gap
    attributes:
      label: Missing or misleading guidance
    validations:
      required: true
  - type: textarea
    id: audience
    attributes:
      label: Primary audience (pick one or combine succinctly)
      placeholder: OSS contributor • internal Orchestrator swarm • payroll operator • security reviewer
    validations:
      required: true
  - type: textarea
    id: proposed_fix
    attributes:
      label: Ideal fix outline
      description: Outline sections/snippets; optional PR willingness.
    validations:
      required: false
